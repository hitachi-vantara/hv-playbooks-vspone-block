# ============================================================
# Playbook: datastore_create/site.yml
# Description:
#   Automates the creation of VMFS datastores on VMware ESXi
#   hosts using the community.vmware.vmware_host_datastore
#   module. Prompts the user at runtime for the datastore name
#   and device canonical name discovered from the HBA scan
#   playbook (scan_hba).
#
#   Recommended Workflow Order:
#     Step 1 -> brocade-zoning  (zone and map LUN to ESXi host)
#     Step 2 -> scan_hba        (rescan HBAs, discover canonical name)
#     Step 3 -> datastore_create (create VMFS datastore)
#
#   Usage:
#     ansible-playbook -i inventories/vmware_hosts.yml \
#       site.yml --ask-vault-pass
#
#   Requirements:
#     ansible-galaxy collection install -r ../requirements.yml
#     pip install pyVmomi --break-system-packages
# ============================================================
---
- name: VMware Datastore Creation Workflow
  hosts: localhost
  gather_facts: false
  connection: local

  vars_files:
    - group_vars/all.yml

  vars_prompt:
    - name: datastore_name
      prompt: "Enter the datastore name to create"
      private: false
    - name: vmfs_device_name
      prompt: "Enter the VMFS device name (canonical_name from scan_hba output)"
      private: false

  tasks:

    # ----------------------------------------------------------
    # TASK 1: Create VMFS datastore on specified device
    # ----------------------------------------------------------
    - name: Create VMFS datastore
      community.vmware.vmware_host_datastore:
        hostname: "{{ esxi_hostname }}"
        username: "{{ esxi_username }}"
        password: "{{ esxi_password }}"
        validate_certs: "{{ esxi_validate_certs }}"
        esxi_hostname: "{{ esxi_hostname }}"
        datastore_name: "{{ datastore_name }}"
        datastore_type: vmfs
        vmfs_device_name: "{{ vmfs_device_name }}"
        state: present
      register: datastore_result

    - name: Show datastore creation result
      ansible.builtin.debug:
        msg: "Datastore '{{ datastore_name }}' on device '{{ vmfs_device_name }}' | Changed: {{ datastore_result.changed }}"
