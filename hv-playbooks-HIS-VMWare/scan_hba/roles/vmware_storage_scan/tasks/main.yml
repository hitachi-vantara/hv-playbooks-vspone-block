# ============================================================
# Role Tasks: scan_hba/roles/vmware_storage_scan/tasks/main.yml
# Description:
#   Rescans HBAs and collects storage device information
#   from VMware ESXi hosts using the community.vmware
#   collection.
# ============================================================
---
# ----------------------------------------------------------
# TASK 1: Rescan HBAs and refresh storage visibility
# ----------------------------------------------------------
- name: Rescan HBAs and refresh storage
  community.vmware.vmware_host_scanhba:
    hostname: "{{ esxi_hostname }}"
    username: "{{ esxi_username }}"
    password: "{{ esxi_password }}"
    validate_certs: "{{ esxi_validate_certs }}"
    esxi_hostname: "{{ esxi_hostname }}"
    rescan_hba: true
    refresh_storage: true

# ----------------------------------------------------------
# TASK 2: Retrieve physical disk details
# ----------------------------------------------------------
- name: Get physical disk information
  community.vmware.vmware_host_disk_info:
    hostname: "{{ esxi_hostname }}"
    username: "{{ esxi_username }}"
    password: "{{ esxi_password }}"
    validate_certs: "{{ esxi_validate_certs }}"
    esxi_hostname: "{{ esxi_hostname }}"
  register: disk_info

# ----------------------------------------------------------
# TASK 3: Dump raw disk_info structure for debugging
# ----------------------------------------------------------
- name: Dump raw disk_info structure
  ansible.builtin.debug:
    var: disk_info

# ----------------------------------------------------------
# TASK 4: Display discovered storage devices
# ----------------------------------------------------------
- name: Show available storage devices (Device, UUID, SizeGB)
  ansible.builtin.debug:
    msg: |
      Device: {{ item.display_name }}
      UUID:   {{ item.uuid }}
      SizeGB: {{ item.capacity | default('N/A') }}
  loop: "{{ disk_info.disks | default(disk_info.ansible_facts.disks | default([])) }}"
  loop_control:
    label: "{{ item.display_name }}"
