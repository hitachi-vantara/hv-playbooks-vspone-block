# ============================================================
# Playbook: scan_hba/site.yml
# Description:
#   Entry point for the VMware ESXi HBA Rescan and Storage
#   Discovery workflow. Connects to ESXi via API, triggers
#   an HBA rescan, and displays discovered LUN details
#   (device name, UUID, capacity) for validation before
#   datastore creation.
#
#   Usage:
#     ansible-playbook -i inventories/vmware_hosts.yml \
#       site.yml --ask-vault-pass
#
#   Requirements:
#     ansible-galaxy collection install -r ../requirements.yml
#     pip install pyVmomi --break-system-packages
# ============================================================
---
- name: VMware Storage Scan Workflow
  hosts: localhost
  gather_facts: false
  connection: local

  vars_files:
    - group_vars/all.yml

  roles:
    - vmware_storage_scan
