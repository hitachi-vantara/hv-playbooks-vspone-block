# ============================================================
# Playbook: Brocade G720 Zoning Automation
# Description:
#   This playbook automates Fibre Channel zoning on Brocade G720
#   switches using the brocade.fos Ansible collection.
#
#   Workflow:
#     1. Creates a server alias mapped to its WWPN.
#     2. Builds a zone including both server and storage aliases.
#     3. Adds the zone into an existing configuration (cfg_name).
#     4. Activates the updated configuration on the switch.
#
#   Sensitive credentials are stored securely in an Ansible Vault
#   file, while zoning parameters (aliases, WWPNs, FIDs, zone names,
#   configuration names) are defined in the inventory.
#
# Usage:
#   ansible-playbook playbook.yml -i inventory/hosts.yml --ask-vault-pass
#
# Requirements:
#   ansible-galaxy collection install brocade.fos
# ============================================================

# ============================================================
# Inventory (inventory/hosts.yml):
#
# all:
#   children:
#     brocade_switches:
#       hosts:
#         switch01:
#           ansible_host: 172.23.55.27
#           fid: 128
#           server_alias: "J02-U5-6-HA820G3-ANS"
#           server_wwpn: "10:00:94:40:c9:d0:95:30"
#           storage_alias: "B85-70-26-3A"
#           zone_name: "J02-U5-6-HA820G3-ANS-B85-70-26-3A"
#           cfg_name: "cfg20260218-RM"
#           log_file: "/var/log/brocade_zoning.log"
# ============================================================

---
- name: Brocade G720 Zoning
  hosts: brocade_switches
  gather_facts: yes

  vars_prompt:
    - name: switch_user
      prompt: "Enter switch username"
      private: false
    - name: switch_password
      prompt: "Enter switch password"
      private: true

  tasks:

    # ----------------------------------------------------------
    # TASK 1: Create server alias mapped to its WWPN
    # ----------------------------------------------------------
    - name: Create server alias
      brocade.fos.brocade_zoning_alias:
        credential:
          fos_ip_addr: "{{ ansible_host }}"
          fos_user_name: "{{ switch_user }}"
          fos_password: "{{ switch_password }}"
          https: self
        vfid: "{{ fid }}"
        aliases:
          - name: "{{ server_alias }}"
            members:
              - "{{ server_wwpn }}"
      register: alias_out

    - name: Show alias result
      debug:
        msg: "Alias '{{ server_alias }}' -> {{ server_wwpn }} | Changed: {{ alias_out.changed }}"

    # ----------------------------------------------------------
    # TASK 2: Create zone with server and storage aliases
    # ----------------------------------------------------------
    - name: Create zone with server and storage alias
      brocade.fos.brocade_zoning_zone:
        credential:
          fos_ip_addr: "{{ ansible_host }}"
          fos_user_name: "{{ switch_user }}"
          fos_password: "{{ switch_password }}"
          https: self
        vfid: "{{ fid }}"
        members_add_only: true
        zones:
          - name: "{{ zone_name }}"
            members:
              - "{{ server_alias }}"
              - "{{ storage_alias }}"
      register: zone_out

    - name: Show zone result
      debug:
        msg: "Zone '{{ zone_name }}' members: [{{ server_alias }}, {{ storage_alias }}] | Changed: {{ zone_out.changed }}"

    # ----------------------------------------------------------
    # TASK 3: Add zone to existing configuration and activate
    # ----------------------------------------------------------
    - name: Add zone to existing configuration and enable
      brocade.fos.brocade_zoning_cfg:
        credential:
          fos_ip_addr: "{{ ansible_host }}"
          fos_user_name: "{{ switch_user }}"
          fos_password: "{{ switch_password }}"
          https: self
        vfid: "{{ fid }}"
        members_add_only: true
        cfgs:
          - name: "{{ cfg_name }}"
            members:
              - "{{ zone_name }}"
        active_cfg: "{{ cfg_name }}"
      register: cfg_out

    - name: Show cfg result
      debug:
        msg: "Zone '{{ zone_name }}' added to cfg '{{ cfg_name }}' and activated | Changed: {{ cfg_out.changed }}"
