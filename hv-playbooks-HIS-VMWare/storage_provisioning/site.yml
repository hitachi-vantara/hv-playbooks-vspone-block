# ============================================================
# Playbook: storage_provisioning/site.yml
# Description:
#   Automates server registration and storage provisioning on
#   Hitachi VSP systems using the hitachivantara.vspone_block
#   Ansible collection.
#
#   Workflow:
#     1. Registers VMware server with HBAs and FC paths.
#     2. Saves registered server ID for later use.
#     3. Creates a shared volume with deduplication,
#        compression, and data reduction enabled.
#     4. Saves created volume ID.
#     5. Attaches the volume to the registered server.
#
#   All storage parameters are collected interactively at
#   runtime via vars_prompt — nothing is hardcoded.
#
#   Usage:
#     ansible-playbook -i inventories/fabric.yml \
#       site.yml --ask-vault-pass
#
#   Requirements:
#     ansible-galaxy collection install -r ../requirements.yml
# ============================================================
---
- name: HV Server and Volume Workflow
  hosts: switches
  gather_facts: false

  vars_files:
    - global_vault/vcf_vault.yml

  vars_prompt:
    - name: server_name
      prompt: "Enter the server nickname"
      private: false
    - name: hba_wwn1
      prompt: "Enter the first HBA WWN"
      private: false
    - name: hba_wwn2
      prompt: "Enter the second HBA WWN"
      private: false
    - name: port_ids
      prompt: "Enter the port IDs (comma separated, e.g. CL3-A,CL4-A)"
      private: false
    - name: pool_id
      prompt: "Enter the Pool ID"
      private: false
    - name: volume_size
      prompt: "Enter the Volume Size (e.g. 100GB)"
      private: false
    - name: volume_base_name
      prompt: "Enter the Volume Base Name"
      private: false
    - name: capacity_saving
      prompt: "Enter Capacity Saving (compression / deduplication / deduplication_and_compression)"
      private: false
    - name: capacity_saving_status
      prompt: "Enter Capacity Saving Status (enabled / disabled)"
      private: false
    - name: data_reduction_share
      prompt: "Enable Data Reduction Share? (true / false)"
      private: false

  roles:
    - hv_server_volume
