---
####################################################################
# Combined Playbook: Storage Port & Hostgroup Facts
####################################################################
- name: Storage Port and Hostgroup Facts
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../ansible_vault_vars/ansible_vault_storage_var.yml

  vars:
    # Common connection info for all tasks
    connection_info:
      address: "{{ storage_address }}"
      username: "{{ vault_storage_username }}"
      password: "{{ vault_storage_secret }}"

    # Define ports once and reuse everywhere
    target_ports: ["CL3-A"]

  tasks:
    ####################################################################
    # Task 1 : Get storage port details using port ids
    ####################################################################
    - name: Get storage port details
      hitachivantara.vspone_block.vsp.hv_storage_port_facts:
        connection_info: "{{ connection_info }}"
        spec:
          ports: "{{ target_ports }}"
      register: storage_port_result

    - name: Debug storage port result
      ansible.builtin.debug:
        var: storage_port_result

    ####################################################################
    # Task 2 : Get hostgroups of specific ports
    ####################################################################
    - name: Get hostgroups of specific ports
      hitachivantara.vspone_block.vsp.hv_hg_facts:
        connection_info: "{{ connection_info }}"
        spec:
          ports: "{{ target_ports }}"
      register: hostgroup_result

    - name: Debug hostgroup result
      ansible.builtin.debug:
        var: hostgroup_result

    #######################################################################
    # Task 3 : Get hostgroups of specific ports, include wwns and ldevs
    #######################################################################
    - name: Get hostgroups of specific ports, include wwns and ldevs
      hitachivantara.vspone_block.vsp.hv_hg_facts:
        connection_info: "{{ connection_info }}"
        spec:
          ports: "{{ target_ports }}"
          query:
            - wwns
            - ldevs
      register: hostgroup_wwn_ldev_result

    - name: Debug hostgroup WWN/LDEV result
      ansible.builtin.debug:
        var: hostgroup_wwn_ldev_result
