  AWS::CloudFormation::Interface:
    ParameterGroups:
      -
        Label:
          default: Cluster Configuration
        Parameters:
          - ClusterName
          - AvailabilityZone
          - VpcId
          - ControlSubnetId
          - ControlNetworkCidrBlock
          - InterNodeSubnetId
          - ComputeSubnetId
          - ComputeIpVersion
