          - MPS3KeyPrefix

Mappings:
  Template:
    Version:
      Data: 01.19.01.30

# ----------------------------------------------------------------
#     Resources
# Define the settings for the resource to be created.
# ----------------------------------------------------------------

Resources:

  # ---------- Cluster stack definitions start here. ----------

  StorageClusterDuplication:
    Type: AWS::CloudFormation::Stack
    Condition: StorageClusterDuplicationCreate
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}VMConfigurationFile_Duplication_BYOL.yml
      Parameters:
        LicenseType: BYOL
        StorageNodeStackName: {"Ref": AWS::StackName}
        S3URI: {"Ref": S3URI}
        VpcId: {"Ref": VpcId}
        AvailabilityZone: {"Ref": AvailabilityZone}
        TimeZone: {"Ref": TimeZone}
        ControlSubnetId: {"Ref": ControlSubnetId}
        ControlNetworkCidrBlock: {"Ref": ControlNetworkCidrBlock}
        InterNodeSubnetId: {"Ref": InterNodeSubnetId}
        ComputeSubnetId: {"Ref": ComputeSubnetId}
        ComputeIpVersion: {"Ref": ComputeIpVersion}
        StorageNodeInstanceType: {"Ref": StorageNodeInstanceType}
        BillingCode: {"Ref": BillingCode}
        ClusterName: {"Ref": ClusterName}
        NodeCount: {"Fn::Select": ["3", "Fn::Split": [" ", "Ref": ConfigurationPattern]]}
        DriveCount: {"Ref": DriveCount}
        DriveSize: {"Fn::Select": ["2", "Fn::Split": [" ", "Ref": PhysicalDriveCapacity]]}
        EbsVolumeEncryption: {"Ref": EbsVolumeEncryption}
        EbsVolumeKmsKeyId: {"Ref": EbsVolumeKmsKeyId}
        IamRoleCreationMode: {"Ref": IamRoleCreationMode}
        IamRoleNameForStorageCluster: {"Ref": IamRoleNameForStorageCluster}
        DisableNodeTerminationProtection: "-"
        RemoveNodeNumber: "-"
        RecoverNodeNumber: "-"
        RemoveDriveNodeNumber: "-"
        RemoveDriveNumber: "-"
        StorageNodeAMIId01: {"Ref": ImageId}
        StorageNodeAMIId02: {"Ref": ImageId}
        StorageNodeAMIId03: {"Ref": ImageId}
        StorageNodeAMIId04: {"Ref": ImageId}
        StorageNodeAMIId05: {"Ref": ImageId}
        StorageNodeAMIId06: {"Ref": ImageId}
        StorageNodeAMIId07: {"Ref": ImageId}
        StorageNodeAMIId08: {"Ref": ImageId}
        StorageNodeAMIId09: {"Ref": ImageId}
        StorageNodeAMIId10: {"Ref": ImageId}
        StorageNodeAMIId11: {"Ref": ImageId}
        StorageNodeAMIId12: {"Ref": ImageId}
        StorageNodeAMIId13: {"Ref": ImageId}
        StorageNodeAMIId14: {"Ref": ImageId}
        StorageNodeAMIId15: {"Ref": ImageId}
        StorageNodeAMIId16: {"Ref": ImageId}
        StorageNodeAMIId17: {"Ref": ImageId}
        StorageNodeAMIId18: {"Ref": ImageId}
        MPS3BucketName: {"Ref": MPS3BucketName}
        MPS3BucketRegion: {"Ref": MPS3BucketRegion}
        MPS3KeyPrefix: {"Ref": MPS3KeyPrefix}
 
  StorageCluster4D2P:
    Type: AWS::CloudFormation::Stack
    Condition: StorageCluster4D2PCreate
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}VMConfigurationFile_4D2P_BYOL.yml
      Parameters:
        LicenseType: BYOL
        StorageNodeStackName: {"Ref": AWS::StackName}
        S3URI: {"Ref": S3URI}
        VpcId: {"Ref": VpcId}
        AvailabilityZone: {"Ref": AvailabilityZone}
        TimeZone: {"Ref": TimeZone}
