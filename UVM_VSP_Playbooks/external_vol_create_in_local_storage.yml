---
- name: External Volume
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../ansible_vault_vars/ansible_vault_storage_var.yml

  vars:
    connection_info:
      address: "{{ storage_address }}"
      username: "{{ vault_storage_username }}"
      password: "{{ vault_storage_secret }}"

    external_ldevs:
      - { external_ldev_id: 401, ldev_id: 145, external_parity_group: "1-3" }
      - { external_ldev_id: 402, ldev_id: 146, external_parity_group: "1-4" }
      - { external_ldev_id: 403, ldev_id: 147, external_parity_group: "1-5" }
      - { external_ldev_id: 404, ldev_id: 148, external_parity_group: "1-6" }
      - { external_ldev_id: 405, ldev_id: 149, external_parity_group: "1-7" }
      - { external_ldev_id: 406, ldev_id: 150, external_parity_group: "1-8" }
      - { external_ldev_id: 407, ldev_id: 151, external_parity_group: "1-9" }

  tasks:
    - name: Map external LDEVs to parity groups
      hitachivantara.vspone_block.vsp.hv_external_volume:
        connection_info: "{{ connection_info }}"
        state: present
        spec:
          external_storage_serial: "60240"
          external_ldev_id: "{{ item.external_ldev_id }}"
          ldev_id: "{{ item.ldev_id }}"
          external_parity_group: "{{ item.external_parity_group }}"
      loop: "{{ external_ldevs }}"
      register: results

    - name: Debug results
      debug:
        var: results

